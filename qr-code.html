<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机访问二维码</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .url {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            color: #444;
        }
        .qr-container {
            margin: 20px 0;
        }
        .qr-container img {
            border: 5px solid #333;
            border-radius: 10px;
        }
        .tip {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
        .tip strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 手机扫码访问</h1>
        <p style="color: #666;">请确保手机和电脑连接到同一个Wi-Fi</p>
        
        <div class="url">
            <strong>访问地址：</strong><br>
            http://100.78.163.77:3001/
        </div>
        
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=http%3A%2F%2F100.78.163.77%3A3001%2F" alt="二维码">
        </div>
        
        <div class="tip">
            <p>🔑 <strong>使用说明：</strong></p>
            <p>1. 确保手机和电脑在<strong>同一个Wi-Fi网络</strong></p>
            <p>2. 用手机相机或微信扫描上方二维码</p>
            <p>3. 或者直接在手机浏览器输入上面的地址</p>
        </div>
    </div>
</body>
</html>
